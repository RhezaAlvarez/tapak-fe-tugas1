<div>
  <h1>Login</h1>
  <form (submit)="login()">
    <p>Username</p>
    <input type="text" [(ngModel)]="username" name="username">
    <p>Password</p>
    <input type="password" [(ngModel)]="password" name="password">
    <button type="submit">Login</button>
    <a routerLink="/register">Register</a>
  </form>

  <button (click)="handleOpenModalCreate()">Create</button>
  <button (click)="handleOpenModalEdit()">Edit</button>

  <app-modal [(openModal)]="openModalCreate" title="Create">
    Content Create
  </app-modal>

  <app-modal [(openModal)]="openModalEdit">
    Content Edit
  </app-modal>
</div>
