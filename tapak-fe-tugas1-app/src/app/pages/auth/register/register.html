<div class="container">
  <div class="form">
    <h1>Register</h1>
    <mat-form-field appearance="outline">
      <mat-label>Username</mat-label>
      <input matInput [(ngModel)]="username" name="username" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput [(ngModel)]="password" name="password" type="password" />
    </mat-form-field>
    <div style="width: 100%;">
      <button class="submitButton" type="submit" (click)="handleRegister()"
        [disabled]="username === '' || password === ''">Register</button>
    </div>
    <a routerLink="/login">kembali</a>
  </div>
  <p style="color: red;">{{errorMessage}}</p>
</div>
